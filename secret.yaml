mqtt:
  host: "127.0.0.1"      # Change to 10.1.0.5 when on the GPU laptop
  port: 1883
  keepalive: 60

topics:
  telemetry: "e2cc/unit1/telemetry"
  anomaly: "e2cc/unit1/ai/anomaly"
  rul: "e2cc/unit1/ai/rul"

triton:
  url: "localhost:8010"
  anomaly_model: "isolation_forest"
  rul_model: "lstm"

ai_settings:
  ad_freq_seconds: 10
  lstm_freq_seconds: 20
  seq_len: 6
  failure_threshold: 0.65
  forecast_steps: 168
  step_interval_days: 0.041666667 # 1/24 (1 hour intervals)

system:
  unit_id: "Unit1"
  data_generation_delay: 5
  max_parquet_rows: 2000

paths:
  generated_dataset: "GeneratedDataset"
  predicted_dataset: "PredictedDataset"
  input_scaler: "minmax_scaler.pkl"
  output_scaler: "minmax_scaler_output.pkl"